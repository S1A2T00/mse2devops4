version: '3.8'

services:
  goal-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    
    image: goal-manager:${VERSION:-latest}
    
    container_name: goal-manager-app
    
    # Port configuration
    ports:
      - "${PORT:-8080}:80"
    
    # Environment variables
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    read_only: true
    
    tmpfs:
      - /tmp
      - /var/run/nginx
    
    # Volume mounts (read-only where possible)
    volumes:
      - /tmp
      - /var/run/nginx
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=goal-manager"
    
    # Labels
    labels:
      - "com.example.description=Goal Manager Application"
      - "com.example.version=${VERSION:-1.0.0}"

networks:
  default:
    name: goal-manager-network
    driver: bridge
